{% extends "base.html" %}
{% block title %}Alerts{% endblock %}
{% block nav_alerts %}active{% endblock %}
{% block css %}<link rel="stylesheet" href="/static/css/alerts.css">{% endblock %}

{% block body %}
  <main class="main alerts-main">
    <div class="alerts-toolbar">
      <span class="card-title">Active Alerts</span>
      <button type="button" class="btn ml-auto" onclick="ackAllAlerts()">Acknowledge All</button>
      <button type="button" class="btn" onclick="loadAlerts()">Refresh</button>
    </div>

    <div id="alerts-list"></div>

    <div class="card mt-24">
      <div class="card-header">
        <span class="card-title">Alert Rules</span>
      </div>
      <div id="alert-rules"></div>
    </div>
  </main>
{% endblock %}

{% block scripts %}
<script src="/static/js/alerts.js"></script>
<script>
  'use strict';
  document.addEventListener('DOMContentLoaded', () => {
    loadAlerts();
    loadAlertRules();
  });
</script>
{% endblock %}
